- defaults:
    link:
      relink: true

- clean: ["~", "~/.config"]

- link:
    # ~/.zsh_plugins.txt: zsh/.zsh_plugins.txt
    ~/.zprofile: zsh/.zprofile
    ~/.zshenv: zsh/.zshenv
    ~/.config/zsh: zsh
    ~/.config/.zsh_aliases: zsh/.zsh_aliases
    ~/.config/.zsh_paths: zsh/.zsh_paths
    
- shell:
    - [git submodule update --init --recursive, Installing submodules]
